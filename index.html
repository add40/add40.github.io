<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 홈페이지에 오신걸 환영합니다.</title>
    <style>
        .title{
            color:blue;
        }
        /* 플로팅 버튼 (지름 10mm, 회색) */
        #f1 {
            position: fixed;
            right: 96px;
            bottom: 16px;
            width: 10mm;
            height: 10mm;
            background-color: gray;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 1030;
        }
        #f1:active { transform: scale(0.97); }
        #f1:focus { outline: 2px solid rgba(0,0,0,0.1); }
        /* f2: f1의 오른쪽에 위치 (사용자 요청) */
        #f2 {
            position: fixed;
            right: 56px;
            bottom: 16px;
            width: 10mm;
            height: 10mm;
            background-color: gray;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 1030;
        }
        #f2:active { transform: scale(0.97); }
        #f2:focus { outline: 2px solid rgba(0,0,0,0.1); }
        /* f3: f2의 오른쪽에 위치 */
        #f3 {
            position: fixed;
            right: 16px;
            bottom: 16px;
            width: 10mm;
            height: 10mm;
            background-color: gray;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            cursor: pointer;
            z-index: 1030;
        }
        #f3:active { transform: scale(0.97); }
        #f3:focus { outline: 2px solid rgba(0,0,0,0.1); }
        /* iframe 오버레이 */
        .iframe-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1040;
            padding: 16px;
        }
        .iframe-overlay.active { display: flex; }
        .iframe-container {
            width: 90%;
            height: 90%;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
        .iframe-container .close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        /* 추가: 로딩 스피너, 툴바 */
        .embed-spinner {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 5px solid rgba(0,0,0,0.12);
            border-top-color: rgba(0,0,0,0.6);
            animation: spin 1s linear infinite;
            z-index: 3;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        .embed-toolbar {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 10001;
            display: flex;
            gap: 8px;
        }
        .embed-toolbar button {
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        /* 팝업 허용 안내 토스트 */
        .popup-notice {
            position: fixed;
            right: 16px;
            bottom: 80px;
            background: #222;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            z-index: 11000;
            display: none;
            gap: 8px;
            align-items: center;
        }
        .popup-notice.show { display: flex; }
        .popup-notice button { background: rgba(255,255,255,0.08); color: #fff; border: none; padding:6px 8px; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>
    <h1 class="title"> 우리집 홈페이지</h1> 
    <!-- <button>버튼</button> -->
    <button id="f1" name="f1" aria-label="플로팅 버튼">+</button>
    <button id="f2" name="f2" aria-label="플로팅 버튼 2">★</button>
    <button id="f3" name="f3" aria-label="플로팅 버튼 3">☰</button>

    <!-- 팝업 허용 안내(숨김) -->
    <div id="popupNotice" class="popup-notice" role="alert" aria-hidden="true">
        <div id="popupMsg">팝업이 차단되었습니다. 열 수 없습니다.</div>
        <button id="openSameTab">같은 탭에서 열기</button>
        <button id="dismissNotice">닫기</button>
    </div>

    <!-- iframe 오버레이: f1 클릭 시 내부에 URL을 로드해서 보여줍니다 -->
    <div id="embedOverlay" class="iframe-overlay" role="dialog" aria-hidden="true">
        <div class="iframe-container">
            <button id="embedClose" class="close-btn" aria-label="닫기">×</button>
            <iframe id="embedFrame" src="" title="Embedded content"></iframe>
        </div>
    </div>

    <script>
        (function (){
            var autoFullscreen = true; // 자동 전체화면 전환 여부

            function openFullEmbedFor(url, allowFullscreen) {
                return function () {
                    var body = document.body;
                    var preserved = [];
                    Array.from(body.children).forEach(function (ch) {
                        if (ch.id === 'fullEmbedContainer') return;
                        preserved.push({ el: ch, display: ch.style.display });
                        ch.style.display = 'none';
                    });

                    var container = document.createElement('div');
                    container.id = 'fullEmbedContainer';
                    container.style.position = 'fixed';
                    container.style.inset = '0';
                    container.style.zIndex = '9999';
                    container.style.background = '#fff';
                    container.style.overflow = 'hidden';

                    var toolbar = document.createElement('div');
                    toolbar.className = 'embed-toolbar';

                    // var openTabBtn = document.createElement('button');
                    // openTabBtn.type = 'button';
                    // openTabBtn.textContent = '새 탭에서 열기';
                    // openTabBtn.title = '새 탭에서 열기';
                    // openTabBtn.addEventListener('click', function (e) {
                    //     window.open(url, '_blank');
                    // });
                    // toolbar.appendChild(openTabBtn);
                    // var localAutoFS = !!autoFullscreen;
                    // var fsInfoBtn = null;
                    // if (allowFullscreen) {
                    //     fsInfoBtn = document.createElement('button');
                    //     fsInfoBtn.type = 'button';
                    //     fsInfoBtn.textContent = localAutoFS ? '자동전체화면: 켬' : '자동전체화면: 끔';
                    //     fsInfoBtn.title = '자동 전체화면 토글';
                    //     fsInfoBtn.addEventListener('click', function () {
                    //         localAutoFS = !localAutoFS;
                    //         fsInfoBtn.textContent = localAutoFS ? '자동전체화면: 켬' : '자동전체화면: 끔';
                    //     });
                    //     toolbar.appendChild(fsInfoBtn);
                    // }

                    var closeBtn = document.createElement('button');
                    closeBtn.id = 'fullEmbedClose';
                    closeBtn.setAttribute('aria-label', '닫기');
                    closeBtn.textContent = '×';
                    closeBtn.style.position = 'absolute';
                    closeBtn.style.top = '12px';
                    closeBtn.style.right = '12px';
                    closeBtn.style.width = '40px';
                    closeBtn.style.height = '40px';
                    closeBtn.style.borderRadius = '50%';
                    closeBtn.style.background = 'rgba(0,0,0,0.6)';
                    closeBtn.style.color = '#fff';
                    closeBtn.style.border = 'none';
                    closeBtn.style.cursor = 'pointer';
                    closeBtn.style.zIndex = '10000';

                    var spinner = document.createElement('div');
                    spinner.className = 'embed-spinner';
                    spinner.setAttribute('aria-hidden', 'false');

                    var iframe = document.createElement('iframe');
                    iframe.src = url;
                    iframe.title = 'Embedded page';
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.border = '0';
                    iframe.style.display = 'block';

                    container.appendChild(toolbar);
                    container.appendChild(closeBtn);
                    container.appendChild(spinner);
                    container.appendChild(iframe);
                    document.body.appendChild(container);

                    function restore() {
                        var c = document.getElementById('fullEmbedContainer');
                        if (c) c.remove();
                        preserved.forEach(function (p) { p.el.style.display = p.display || ''; });
                        document.removeEventListener('keydown', escHandler);
                        if (document.fullscreenElement) {
                            document.exitFullscreen && document.exitFullscreen();
                        }
                    }

                    function escHandler(e) { if (e.key === 'Escape') restore(); }
                    closeBtn.addEventListener('click', restore);

                    iframe.addEventListener('load', function () {
                        spinner.setAttribute('aria-hidden', 'true');
                        spinner.style.display = 'none';
                        if (allowFullscreen && localAutoFS && container.requestFullscreen) {
                            container.requestFullscreen().catch(function () { });
                        }
                    });

                    document.addEventListener('keydown', escHandler);
                };
            }

            // f1 (kp...)와 f2 (naver calendar)에 각각 바인딩
            var f1 = document.getElementById('f1');
            var f2 = document.getElementById('f2');
            var f3 = document.getElementById('f3');
            if (f1) f1.addEventListener('click', openFullEmbedFor('https://kp.plk.mmv.kr/', true));
            if (f2) f2.addEventListener('click', openFullEmbedFor('https://calendar.naver.com/', false));
            if (f3) f3.addEventListener('click', function () {
                var targetUrl = 'https://calendar.naver.com/';
                // 열린 창 참조를 보존해서 30초 후에 닫기 시도
                var w = window.open(targetUrl, '_blank');
                if (w) {
                    setTimeout(function () {
                        try { if (!w.closed) w.close(); } catch (e) { }
                    }, 30000);
                } else {
                    // 팝업 차단: 안내 표시 및 같은 탭에서 열기 옵션 제공
                    var notice = document.getElementById('popupNotice');
                    var msg = document.getElementById('popupMsg');
                    var openSame = document.getElementById('openSameTab');
                    var dismiss = document.getElementById('dismissNotice');
                    msg.textContent = '팝업이 차단되었습니다. 같은 탭에서 열겠습니까?';
                    notice.classList.add('show');
                    notice.setAttribute('aria-hidden', 'false');

                    function hideNotice() {
                        notice.classList.remove('show');
                        notice.setAttribute('aria-hidden', 'true');
                        openSame.removeEventListener('click', onOpenSame);
                        dismiss.removeEventListener('click', hideNotice);
                    }

                    function onOpenSame() {
                        hideNotice();
                        window.location.href = targetUrl;
                    }

                    openSame.addEventListener('click', onOpenSame);
                    dismiss.addEventListener('click', hideNotice);
                }
            });

            // 페이지가 열리면 f1 자동 실행, f3는 10분마다 자동 실행
            window.addEventListener('load', function () {
                try { if (f1) f1.click(); } catch (e) { }
                if (f3) {
                    // 즉시 실행 후 600초 간격
                    try { f3.click(); } catch (e) { }
                    setInterval(function () { try { f3.click(); } catch (e) { } }, 600000);
                }
            });
        })();
    </script>
</body>

</html>
